<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root{
        --bg:#FFFDFA;--ink:#1C2B33;--ink-s:rgba(28,43,51,0.62);
        --coral:#FF6B57;--coral-d:#E8543F;--teal:#0E7C7B;
        --disp:'Poppins',sans-serif;--sans:'Inter',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1200px;height:630px;background:var(--bg);overflow:hidden;position:relative;font-family:var(--sans)}
    .blob{position:absolute;border-radius:50%;filter:blur(80px)}
    .b1{width:520px;height:520px;background:rgba(255,107,87,0.18);top:-140px;right:-120px}
    .b2{width:460px;height:460px;background:rgba(14,124,123,0.15);bottom:-160px;left:-120px}
    .card{position:absolute;inset:0;padding:74px 80px;display:flex;flex-direction:column;justify-content:space-between;z-index:2}
    .top{display:flex;align-items:center;justify-content:space-between}
    .mark{font-family:var(--disp);font-weight:700;font-size:40px;letter-spacing:-.02em;color:var(--ink)}
    .mark span{color:var(--coral)}
    .tag{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--teal);background:rgba(14,124,123,0.1);padding:11px 22px;border-radius:100px}
    h1{font-family:var(--disp);font-weight:700;font-size:74px;line-height:1.04;letter-spacing:-.03em;color:var(--ink);max-width:1000px}
    .sub{font-size:25px;font-weight:300;color:var(--ink-s);margin-top:26px;max-width:880px;line-height:1.5}
    .sub b{color:var(--ink);font-weight:500}
    .bottom{display:flex;align-items:center;justify-content:space-between}
    .chips{display:flex;gap:11px}
    .chip{font-family:var(--disp);font-weight:500;font-size:17px;color:var(--ink-s);border:1.5px solid rgba(28,43,51,0.12);background:rgba(255,255,255,0.5);padding:9px 19px;border-radius:100px}
    .url{font-family:var(--disp);font-weight:600;font-size:22px;color:var(--coral-d)}
</style>
</head>
<body>
<span class="blob b1"></span>
<span class="blob b2"></span>
<div class="card">
    <div class="top">
        <div class="mark">CID<span>.</span></div>
        <div class="tag">AI &amp; ML studio · for women founders</div>
    </div>
    <div>
        <h1>Let's make your AI project come true.</h1>
        <p class="sub">You've got the dream. I build the <b>intelligence</b> that makes it real — with ethics, a human touch, and always in support of women.</p>
    </div>
    <div class="bottom">
        <div class="chips">
            <span class="chip">Apps for women</span>
            <span class="chip">Families</span>
            <span class="chip">Kids</span>
        </div>
        <div class="url">cogdev.ai</div>
    </div>
</div>
</body>
</html>
